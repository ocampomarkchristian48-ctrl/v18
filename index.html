<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mind Logic</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">Mind Logic</h1>

<!-- START -->
<div id="startScreen" class="card">
<h2>🧠 Mind Logic</h2>
<input id="playerName" placeholder="Your name">
<button onclick="startGame()">Play</button>
</div>

<!-- TOPIC SELECTION -->
<div id="topicScreen" class="hidden topicPage">

<h2>Select Topic</h2>

<div class="topicGrid">

<button onclick="selectTopic('probability')" class="topicBtn">Probability</button>
<button onclick="selectTopic('group')" class="topicBtn">Group Theory</button>
<button onclick="selectTopic('predicate')" class="topicBtn">Predicate Logic</button>
<button onclick="selectTopic('counting')" class="topicBtn">Counting Theory</button>

</div>

</div>

<!-- QUIZ -->
<div id="quizScreen" class="hidden gameUI">

<div class="questionBox">
<h2 id="question"></h2>
</div>

<div class="choicesBox">
<div id="answers" class="answers"></div>

<button id="nextBtn" onclick="nextQuestion()" class="hidden">
Next
</button>

</div>

</div>

<!-- RESULT -->
<div id="resultScreen" class="hidden resultBox">
<h2 id="resultTitle"></h2>
<p id="resultScore"></p>

<button onclick="retryGame()">Play Again</button>
</div>

<script src="script.js"></script>

</body>
</html>
